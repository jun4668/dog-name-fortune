<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>犬の名前占い</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:sans-serif;
      color:white;
      background:
        radial-gradient(circle at top, #4b1111 0%, #180909 35%, #080808 100%);
      min-height:100vh;
      padding:24px 14px 40px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      display:grid;
      gap:20px;
    }

    @media(min-width:900px){
      .wrap{
        grid-template-columns:320px 1fr;
        align-items:start;
      }
    }

    .card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:22px 18px 24px;
      box-shadow:0 12px 30px rgba(0,0,0,0.35);
      backdrop-filter:blur(4px);
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.3;
    }

    .sub{
      color:#dfd6d6;
      font-size:14px;
      line-height:1.7;
      margin-top:10px;
    }

    .guide-wrap{
      text-align:center;
      margin-bottom:16px;
    }

    .guide-badge{
      display:inline-block;
      margin-top:10px;
      background:rgba(255,255,255,0.1);
      border-radius:999px;
      padding:7px 14px;
      font-size:13px;
      color:#fff;
    }

    .guide-dog{
      position:relative;
      width:170px;
      height:170px;
      margin:0 auto 8px;
    }

    .glow{
      position:absolute;
      inset:18px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      filter:blur(18px);
    }

    .dog-head{
      position:absolute;
      left:50%;
      top:50%;
      width:100px;
      height:116px;
      transform:translate(-50%,-46%);
      background:#111;
      border-radius:48% 48% 44% 44%;
      border:2px solid rgba(255,255,255,0.08);
    }

    .ear-left,.ear-right{
      position:absolute;
      width:34px;
      height:58px;
      background:#111;
      top:24px;
      border:2px solid rgba(255,255,255,0.08);
      border-radius:50%;
    }

    .ear-left{
      left:28px;
      transform:rotate(-18deg);
    }

    .ear-right{
      right:28px;
      transform:rotate(18deg);
    }

    .eye{
      position:absolute;
      width:16px;
      height:16px;
      background:#fff;
      border-radius:50%;
      top:70px;
    }

    .eye.left{ left:63px; }
    .eye.right{ right:63px; }

    .pupil{
      position:absolute;
      width:7px;
      height:7px;
      background:#111;
      border-radius:50%;
      top:5px;
      left:5px;
    }

    .nose{
      position:absolute;
      left:50%;
      top:97px;
      width:26px;
      height:18px;
      transform:translateX(-50%);
      background:#000;
      border-radius:50%;
    }

    .mouth{
      position:absolute;
      left:50%;
      top:118px;
      width:34px;
      height:16px;
      transform:translateX(-50%);
      border-bottom:3px solid #fff;
      border-radius:0 0 20px 20px;
    }

    label{
      display:block;
      font-size:14px;
      color:#e6dede;
      margin:10px 0 8px;
      text-align:left;
    }

    input{
      width:100%;
      padding:14px 16px;
      border:none;
      outline:none;
      border-radius:16px;
      background:rgba(255,255,255,0.12);
      color:white;
      font-size:16px;
    }

    input::placeholder{
      color:#c8bebe;
    }

    button{
      width:100%;
      margin-top:14px;
      padding:14px 16px;
      border:none;
      border-radius:16px;
      background:#9d2020;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#b52a2a;
    }

    .result-title{
      font-size:28px;
      margin:0 0 12px;
      line-height:1.4;
    }

    .section{
      background:rgba(0,0,0,0.22);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:18px 16px;
      margin-top:14px;
    }

    .section-title{
      font-size:15px;
      font-weight:bold;
      color:#ffb9b9;
      margin-bottom:8px;
    }

    .fortune-text{
      white-space:pre-line;
      line-height:2;
      color:#f6eeee;
      font-size:15px;
    }

    .empty{
      min-height:380px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#ddd2d2;
      line-height:1.9;
      padding:20px;
    }

    .chip{
      display:inline-block;
      background:rgba(157,32,32,0.35);
      border:1px solid rgba(255,255,255,0.08);
      color:white;
      padding:7px 12px;
      border-radius:999px;
      font-size:13px;
      margin-bottom:12px;
    }

    .share-btn{
      background:#1d9bf0;
      margin-top:18px;
    }

    .share-btn:hover{
      background:#1482cc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="guide-wrap">
        <div class="guide-dog">
          <div class="glow"></div>
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="dog-head"></div>
          <div class="eye left"><div class="pupil"></div></div>
          <div class="eye right"><div class="pupil"></div></div>
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>
        <div class="guide-badge">黒いフレンチブルドックの案内犬</div>
      </div>

      <h1>犬の名前占い</h1>
      <div class="sub">
        愛犬の名前を入れると、黒いフレンチブルドックの案内犬が
        その子の前世、生まれ持つ性格、そして名前がもたらす影響力を
        長めに読み解いて教えてくれます。
      </div>

      <label for="dogName">愛犬の名前</label>
      <input id="dogName" type="text" placeholder="例：あやめ、コマチ、ボブ" />

      <button onclick="readFortune()">名前を占う</button>
    </div>

    <div class="card">
      <div id="resultArea" class="empty">
        <div>
          <div class="chip">案内犬が待っています</div>
          <div>
            愛犬の名前を入れると、<br>
            前世・性格・名前に宿る力を、<br>
            ゆっくり丁寧に読み解いてくれます。
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function hashString(str){
      let h = 0;
      for(let i = 0; i < str.length; i++){
        h = (h * 31 + str.charCodeAt(i)) >>> 0;
      }
      return h;
    }

    const pastLives = [
      "月夜の石畳を静かに歩き、人々を安全な家まで導いていた黒衣の旅犬",
      "古い洋館の扉の前で、家族の秘密と幸福を黙って守っていた気高い番犬",
      "海辺の町で霧の夜ごとに迷う人を灯台へ導いていた、光に寄り添う案内犬",
      "森の奥にある祈りの泉を守り、傷ついた旅人の心を落ち着かせていた守護獣",
      "王宮で大切な手紙と小さな願いを運んでいた、誇り高く忠実な使者の犬",
      "雪の宿で震える旅人を暖炉の前まで連れていき、安心を与えていた宿守りの犬",
      "星を読む占い師のそばで、未来を映す静かな気配を感じ取っていた神秘の案内犬",
      "港町で船乗りたちの無事を祈り、帰りを待つ人々の心を支えていたお守り犬",
      "古寺の回廊で夜ごとに月明かりを浴び、迷う魂を静かに見送っていた霊性の高い犬",
      "花の庭園で子どもたちの願いを集め、幸福を呼ぶ風とともに生きていた祝福の犬"
    ];

    const natures = [
      "生まれつき愛情深く、飼い主の気持ちをよく察する優しい性格です。甘えん坊に見えて、いざという時は驚くほど頼もしい芯の強さを見せます。家族の気分の変化を敏感に感じ取り、そっと寄り添うことで場の空気をやわらげる力を持っています。",
      "好奇心が強く、周囲の空気を読むのが得意なタイプです。楽しいことが大好きで、家の中を明るくする太陽のような存在になりやすいでしょう。新しい遊びや出会いにも前向きで、毎日の生活に小さな冒険と笑顔を連れてきてくれます。",
      "警戒心と優しさのバランスがよく、家族を守ろうとする意識が強い性格です。最初は慎重でも、心を許した相手にはとことん一途です。大切な人のそばでは責任感が高まり、見えないところでしっかり空気を読んで動く賢さを持っています。",
      "感受性が高く、声のトーンや表情の変化に敏感です。そのぶん絆が深まりやすく、『この子は分かってくれている』と感じる瞬間が多いでしょう。優しさが深い反面、寂しさも感じやすいので、愛情を言葉と触れ合いで伝えるほど安心して輝きます。",
      "穏やかでマイペースに見えて、実は誇り高く自分の流儀を持っています。無理に急がせず、その子のペースを尊重するほど魅力が輝きます。静かに見えても内側には強い意志があり、自分が信じた相手には深い信頼を寄せるでしょう。",
      "遊び好きで陽気ですが、家族に対してはとても献身的です。楽しい空気を広げる力があり、気づくとみんなの中心にいるタイプです。場を明るくする一方で、飼い主が落ち込んでいるときには不思議なくらいそばに来て励ましてくれる温かさも持っています。",
      "小さなことにもよく気づく繊細さと、ここぞという場面で前に出る勇気を兼ね備えています。普段は可愛らしく見えても、本当は家族の運気を守る門番のような役割を持つタイプです。",
      "甘え上手で人懐っこい魅力がありながら、どこか神秘的で、自分だけの世界観を持っています。じっと見つめてくるときは、ただ見ているのではなく、心の奥まで感じ取っているのかもしれません。"
    ];

    const influences = [
      "この名前は、その子の中にある“守る力”を強めます。家族への忠誠心や安心感を育て、そばにいるだけで不思議と心が落ち着く存在へと導くでしょう。呼ばれるたびに『ここが自分の帰る場所なんだ』という感覚が深まり、家そのものを守る存在へと育ちやすくなります。",
      "この名前には、幸運と人を惹きつける華やかさがあります。呼ばれるたびに愛情を受け取りやすくなり、その子の明るさや魅力が自然に引き出されます。人から可愛がられる運も強く、外でも家の中でも人気者になりやすい響きを持っています。",
      "この名前は、直感の鋭さと絆の深さを高める響きを持っています。飼い主の気持ちを察する力が強まり、言葉を超えて通じ合う関係になりやすいでしょう。名前そのものが心の通訳のように働き、その子の“分かってくれる力”を育てていきます。",
      "この名前は、その子の自信と気品を育てる名前です。堂々とした雰囲気や独特の存在感を後押しし、『この子らしさ』をいっそう際立たせます。見た目の可愛さだけでなく、内側からにじむ誇り高さや品の良さまで引き出してくれるでしょう。",
      "この名前には、癒やしと再生の力があります。疲れて帰ってきた家族の心をゆるめ、家の空気そのものを優しく整える役目を与えてくれるでしょう。名前を呼ぶこと自体が小さなおまじないのようになり、日々の生活に安心感を増やしてくれます。",
      "この名前は、冒険心と学びの運を呼び込みます。新しい経験を楽しみながら吸収し、年齢を重ねても好奇心を失わない生き生きとした犬へ導きます。お散歩や旅先、出会いの場でその名前の力が強く働き、『経験するほど魅力が増す子』になりやすいでしょう。",
      "この名前には、神秘的な守護運が宿っています。偶然のように見える幸運や、危険を避ける不思議なタイミングを引き寄せやすく、その子自身だけでなく家族にも静かな守りを与える響きです。",
      "この名前は、愛され運を大きく育てます。呼ばれるたびにその子の魅力がやわらかく広がり、人との縁や優しさを受け取りやすくしてくれるため、『この子がいるだけで空気が和らぐ』という存在になりやすいでしょう。"
    ];

    const luckyExtras = [
      "青い毛布やお気に入りのクッションに縁がありそうです。",
      "朝のあいさつや名前をやさしく呼ぶ時間が運気を高めます。",
      "窓辺で日向ぼっこする時間が心を整える鍵になります。",
      "家族みんなの笑い声が、この子にとって最高のお守りです。",
      "お散歩中の寄り道や季節の匂いが運気を育てます。",
      "やわらかい声でたくさん名前を呼ばれるほど魅力が増していきます。",
      "お気に入りのおもちゃを大切にすることで安心運が高まります。",
      "夜寝る前にやさしく名前を呼んでもらうと守護運が整いやすいでしょう。"
    ];

    function buildFortune(name){
      const seed = hashString(name.trim());
      const pastLife = pastLives[seed % pastLives.length];
      const nature = natures[(seed >> 3) % natures.length];
      const influence = influences[(seed >> 6) % influences.length];
      const extra = luckyExtras[(seed >> 9) % luckyExtras.length];

      const text =
`前世を見ると、${name}ちゃんは「${pastLife}」として生きていた気配があります。そのため今世でも、ただ可愛いだけではなく、誰かを導いたり守ったりする役目を自然と背負いやすいでしょう。家族のそばにいることで安心感を与えたり、場の空気を静かに整えたりする力を持っている可能性があります。

生まれ持つ性格としては、${nature} そのため、表面に見える愛らしさの奥には、思っている以上に深い優しさと賢さが眠っています。ときどき見せるしぐさや目線の中にも、この子らしい誇りや繊細さが表れているはずです。

そして「${name}」という名前がもたらす影響力は、とても大きいものがあります。${influence} 名前は毎日もっとも多く受け取る“音のお守り”なので、呼ばれるたびにその子の個性は磨かれ、前世から持ってきた魅力が今の姿の中で少しずつ育っていくでしょう。

さらに言えば、${extra} ${name}ちゃんは、愛情を受けるほど運勢が安定し、家族との絆が深まるほど本来の魅力が強く表に出るタイプです。たくさん名前を呼ばれ、たくさん褒められ、大切に見つめられることで、この名前に込められた力はより豊かに花開いていきます。`;

      return {
        pastLife,
        text
      };
    }

    function readFortune(){
      const input = document.getElementById("dogName");
      const name = input.value.trim();
      const area = document.getElementById("resultArea");

      if(!name){
        area.innerHTML = `
          <div class="empty">
            <div>
              <div class="chip">名前を入れてください</div>
              <div>愛犬の名前を入れると、案内犬が占いを始めます。</div>
            </div>
          </div>
        `;
        return;
      }

      const result = buildFortune(name);

      area.innerHTML = `
        <div class="chip">案内結果</div>
        <h2 class="result-title">${name}ちゃんの名前占い</h2>

        <div class="section">
          <div class="section-title">前世</div>
          <div class="fortune-text">${result.pastLife}</div>
        </div>

        <div class="section">
          <div class="section-title">案内犬からの読み解き</div>
          <div class="fortune-text">${result.text}</div>
        </div>

        <button class="share-btn" onclick="shareX('${name.replace(/'/g, "\\'")}')">Xでシェア</button>
      `;
    }

    function shareX(name){
      const url = "https://jun4668.github.io/dog-name-fortune/";
      const text = `🐶 ${name}ちゃんの名前占いをしてみた\n前世・性格・名前の力を案内犬が読み解いてくれました`;
      window.open(
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(url),
        "_blank"
      );
    }
  </script>
</body>
</html>
