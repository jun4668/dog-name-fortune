for(let i=0;i<str.length;i++){

function buildFortune(name){

const seed=hashString(name);

const past=pastLives[seed%pastLives.length];
const nature=natures[(seed>>3)%natures.length];
const influence=influences[(seed>>6)%influences.length];
const extra=extras[(seed>>9)%extras.length];

return`

前世を見ると、この子は
「${past}」として生きていた可能性があります。

そのため今世でも、ただ可愛いだけではなく
誰かを守ったり導いたりする役目を持つ犬でしょう。

性格としては
${nature}

名前の持つ力として
${influence}

さらに
${extra}

愛情を受けるほど
この子の魅力は大きく花開いていきます。
`;

}

function readFortune(){

const name=document.getElementById("dogName").value.trim();

if(!name)return;

const result=buildFortune(name);

document.getElementById("resultArea").innerHTML=`

<h2>${name}ちゃんの名前占い</h2>

<div class="section">
<div class="section-title">占い結果</div>
<div class="fortune">${result}</div>
</div>

`;

}
